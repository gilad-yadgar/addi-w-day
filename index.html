<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>addi-w-day</title>
  <style>
    :root {
      --bg1: #d8f0ff;
      --bg2: #fff6dc;
      --text: #1f2a36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Arial", sans-serif;
      color: var(--text);
      background: #d9e5ef;
    }

    h1 {
      position: fixed;
      inset: 0;
      margin: auto;
      width: fit-content;
      height: fit-content;
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 0 2px 0 #fff;
      z-index: 1;
      pointer-events: none;
    }

    .pet {
      position: fixed;
      width: clamp(72px, 12vw, 150px);
      height: auto;
      user-select: none;
      cursor: pointer;
      z-index: 3;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.2));
      transition: transform 0.1s linear;
      -webkit-user-drag: none;
    }

    .pet:active {
      transform: scale(0.92);
    }

    #cat { left: 4%; top: 4%; }
    #lion { left: 27%; top: 4%; }
    #tiger { left: 50%; top: 4%; }
    #chick { left: 73%; top: 4%; }
    #seal { left: 4%; top: 34%; }
    #penguin { left: 27%; top: 34%; }
    #fox { left: 50%; top: 34%; }
    #deer { left: 73%; top: 34%; }
    #bear { left: 22%; top: 66%; }
    #koala { left: 45%; top: 66%; }

    .hint {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      z-index: 5;
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <h1>אוהב אותך אישתי האהובה</h1>
  <div class="hint">תלחצי על החיות - הן עושות רעש</div>

  <img id="cat" class="pet" src="./assets/animals/cat.png" alt="Chibi cat" data-sound="cat" />
  <img id="lion" class="pet" src="./assets/animals/lion.png" alt="Chibi lion" data-sound="lion" />
  <img id="tiger" class="pet" src="./assets/animals/tiger.png" alt="Chibi tiger" data-sound="tiger" />
  <img id="chick" class="pet" src="./assets/animals/chick.png" alt="Chibi chick" data-sound="chick" />
  <img id="seal" class="pet" src="./assets/animals/seal.png" alt="Chibi seal" data-sound="seal" />
  <img id="penguin" class="pet" src="./assets/animals/penguin.png" alt="Chibi penguin" data-sound="penguin" />
  <img id="fox" class="pet" src="./assets/animals/fox.png" alt="Chibi fox" data-sound="fox" />
  <img id="deer" class="pet" src="./assets/animals/deer.png" alt="Chibi deer" data-sound="deer" />
  <img id="bear" class="pet" src="./assets/animals/bear.png" alt="Chibi bear" data-sound="bear" />
  <img id="koala" class="pet" src="./assets/animals/koala.png" alt="Chibi koala" data-sound="koala" />

  <audio id="catSound" preload="auto" src="./assets/sounds/cat.mp3"></audio>
  <audio id="lionSound" preload="auto" src="./assets/sounds/lion.mp3"></audio>
  <audio id="tigerSound" preload="auto" src="./assets/sounds/tiger.mp3"></audio>
  <audio id="chickSound" preload="auto" src="./assets/sounds/chick.mp3"></audio>
  <audio id="sealSound" preload="auto" src="./assets/sounds/seal.mp3"></audio>
  <audio id="penguinSound" preload="auto" src="./assets/sounds/penguin.mp3"></audio>
  <audio id="foxSound" preload="auto" src="./assets/sounds/fox.mp3"></audio>
  <audio id="deerSound" preload="auto" src="./assets/sounds/deer.mp3"></audio>
  <audio id="bearSound" preload="auto" src="./assets/sounds/bear.mp3"></audio>
  <audio id="koalaSound" preload="auto" src="./assets/sounds/koala.mp3"></audio>

  <script>
    const sounds = {
      cat: document.getElementById("catSound"),
      lion: document.getElementById("lionSound"),
      tiger: document.getElementById("tigerSound"),
      chick: document.getElementById("chickSound"),
      seal: document.getElementById("sealSound"),
      penguin: document.getElementById("penguinSound"),
      fox: document.getElementById("foxSound"),
      deer: document.getElementById("deerSound"),
      bear: document.getElementById("bearSound"),
      koala: document.getElementById("koalaSound"),
    };
    const pets = Array.from(document.querySelectorAll(".pet"));

    for (const pet of pets) {
      pet.addEventListener("click", async () => {
        try {
          const soundName = pet.dataset.sound || "cat";
          const audio = sounds[soundName] || sounds.cat;
          audio.currentTime = 0;
          await audio.play();
        } catch (err) {
          console.error("Audio play blocked", err);
        }
      });
    }

  </script>
</body>
</html>
