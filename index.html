<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>addi-w-day</title>
  <style>
    :root {
      --bg1: #d8f0ff;
      --bg2: #fff6dc;
      --text: #1f2a36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Arial", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg1) 45%, var(--bg2) 100%);
    }

    h1 {
      position: fixed;
      inset: 0;
      margin: auto;
      width: fit-content;
      height: fit-content;
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 0 2px 0 #fff;
      z-index: 1;
      pointer-events: none;
    }

    .pet {
      position: fixed;
      width: 170px;
      height: 170px;
      user-select: none;
      cursor: pointer;
      z-index: 3;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.2));
      transition: transform 0.1s linear;
      -webkit-user-drag: none;
      background-image: url("./chibi-sheet.png");
      background-size: 768px 512px;
      background-repeat: no-repeat;
      border-radius: 18px;
    }

    .pet:active {
      transform: scale(0.92);
    }

    #cat { background-position: -30px -45px; left: 6%; top: 8%; }
    #lion { background-position: -210px -45px; left: 26%; top: 8%; }
    #tiger { background-position: -365px -45px; left: 46%; top: 8%; }
    #bird { background-position: -525px -45px; left: 66%; top: 8%; }
    #seal { background-position: -30px -215px; left: 6%; top: 40%; }
    #penguin { background-position: -230px -215px; left: 26%; top: 40%; }
    #fox { background-position: -390px -215px; left: 46%; top: 40%; }
    #deer { background-position: -540px -215px; left: 66%; top: 40%; }
    #bear { background-position: -40px -340px; left: 16%; top: 70%; }
    #koala { background-position: -230px -340px; left: 36%; top: 70%; }

    .hint {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      z-index: 5;
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <h1>אוהב אותך אישתי האהובה</h1>
  <div class="hint">תלחצי על החיות - הן עושות רעש</div>

  <div id="cat" class="pet" role="button" aria-label="Chibi cat" data-sound="rabbit"></div>
  <div id="lion" class="pet" role="button" aria-label="Chibi lion" data-sound="rabbit"></div>
  <div id="tiger" class="pet" role="button" aria-label="Chibi tiger" data-sound="rabbit"></div>
  <div id="bird" class="pet" role="button" aria-label="Chibi bird" data-sound="penguin"></div>
  <div id="seal" class="pet" role="button" aria-label="Chibi seal" data-sound="penguin"></div>
  <div id="penguin" class="pet" role="button" aria-label="Chibi penguin" data-sound="penguin"></div>
  <div id="fox" class="pet" role="button" aria-label="Chibi fox" data-sound="rabbit"></div>
  <div id="deer" class="pet" role="button" aria-label="Chibi deer" data-sound="rabbit"></div>
  <div id="bear" class="pet" role="button" aria-label="Chibi bear" data-sound="rabbit"></div>
  <div id="koala" class="pet" role="button" aria-label="Chibi koala" data-sound="rabbit"></div>

  <audio id="penguinSound" preload="auto" src="./assets/sounds/penguin.mp3"></audio>
  <audio id="rabbitSound" preload="auto" src="./assets/sounds/rabbit.mp3"></audio>

  <script>
    const sounds = {
      penguin: document.getElementById("penguinSound"),
      rabbit: document.getElementById("rabbitSound"),
    };
    const pets = Array.from(document.querySelectorAll(".pet"));

    for (const pet of pets) {
      pet.addEventListener("click", async () => {
        try {
          const soundName = pet.dataset.sound || "rabbit";
          const audio = sounds[soundName] || sounds.rabbit;
          audio.currentTime = 0;
          await audio.play();
        } catch (err) {
          console.error("Audio play blocked", err);
        }
      });
    }

  </script>
</body>
</html>
