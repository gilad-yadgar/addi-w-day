<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>addi-w-day</title>
  <style>
    :root {
      --bg1: #d8f0ff;
      --bg2: #fff6dc;
      --text: #1f2a36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Arial", sans-serif;
      color: var(--text);
      background: #d9e5ef;
    }

    h1 {
      position: fixed;
      inset: 0;
      margin: auto;
      width: fit-content;
      height: fit-content;
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 0 2px 0 #fff;
      z-index: 1;
      pointer-events: none;
    }

    .pet {
      position: fixed;
      width: 150px;
      height: 133px;
      user-select: none;
      cursor: pointer;
      z-index: 3;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.2));
      transition: transform 0.1s linear;
      -webkit-user-drag: none;
      background-image: url("./chibi-sheet.png");
      background-size: 600px 400px;
      background-repeat: no-repeat;
      border-radius: 18px;
    }

    .pet:active {
      transform: scale(0.92);
    }

    #cat { background-position: 0 0; left: 4%; top: 4%; }
    #lion { background-position: -150px 0; left: 27%; top: 4%; }
    #tiger { background-position: -300px 0; left: 50%; top: 4%; }
    #chick { background-position: -450px 0; left: 73%; top: 4%; }
    #seal { background-position: 0 -133px; left: 4%; top: 34%; }
    #penguin { background-position: -150px -133px; left: 27%; top: 34%; }
    #fox { background-position: -300px -133px; left: 50%; top: 34%; }
    #deer { background-position: -450px -133px; left: 73%; top: 34%; }
    #bear { background-position: 0 -266px; left: 22%; top: 66%; }
    #koala { background-position: -150px -266px; left: 45%; top: 66%; }

    .hint {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      z-index: 5;
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <h1>אוהב אותך אישתי האהובה</h1>
  <div class="hint">תלחצי על החיות - הן עושות רעש</div>

  <div id="cat" class="pet" role="button" aria-label="Chibi cat" data-sound="cat"></div>
  <div id="lion" class="pet" role="button" aria-label="Chibi lion" data-sound="lion"></div>
  <div id="tiger" class="pet" role="button" aria-label="Chibi tiger" data-sound="tiger"></div>
  <div id="chick" class="pet" role="button" aria-label="Chibi chick" data-sound="chick"></div>
  <div id="seal" class="pet" role="button" aria-label="Chibi seal" data-sound="seal"></div>
  <div id="penguin" class="pet" role="button" aria-label="Chibi penguin" data-sound="penguin"></div>
  <div id="fox" class="pet" role="button" aria-label="Chibi fox" data-sound="fox"></div>
  <div id="deer" class="pet" role="button" aria-label="Chibi deer" data-sound="deer"></div>
  <div id="bear" class="pet" role="button" aria-label="Chibi bear" data-sound="bear"></div>
  <div id="koala" class="pet" role="button" aria-label="Chibi koala" data-sound="koala"></div>

  <audio id="catSound" preload="auto" src="./assets/sounds/cat.mp3"></audio>
  <audio id="lionSound" preload="auto" src="./assets/sounds/lion.mp3"></audio>
  <audio id="tigerSound" preload="auto" src="./assets/sounds/tiger.mp3"></audio>
  <audio id="chickSound" preload="auto" src="./assets/sounds/chick.mp3"></audio>
  <audio id="sealSound" preload="auto" src="./assets/sounds/seal.mp3"></audio>
  <audio id="penguinSound" preload="auto" src="./assets/sounds/penguin.mp3"></audio>
  <audio id="foxSound" preload="auto" src="./assets/sounds/fox.mp3"></audio>
  <audio id="deerSound" preload="auto" src="./assets/sounds/deer.mp3"></audio>
  <audio id="bearSound" preload="auto" src="./assets/sounds/bear.mp3"></audio>
  <audio id="koalaSound" preload="auto" src="./assets/sounds/koala.mp3"></audio>

  <script>
    const sounds = {
      cat: document.getElementById("catSound"),
      lion: document.getElementById("lionSound"),
      tiger: document.getElementById("tigerSound"),
      chick: document.getElementById("chickSound"),
      seal: document.getElementById("sealSound"),
      penguin: document.getElementById("penguinSound"),
      fox: document.getElementById("foxSound"),
      deer: document.getElementById("deerSound"),
      bear: document.getElementById("bearSound"),
      koala: document.getElementById("koalaSound"),
    };
    const pets = Array.from(document.querySelectorAll(".pet"));

    for (const pet of pets) {
      pet.addEventListener("click", async () => {
        try {
          const soundName = pet.dataset.sound || "cat";
          const audio = sounds[soundName] || sounds.cat;
          audio.currentTime = 0;
          await audio.play();
        } catch (err) {
          console.error("Audio play blocked", err);
        }
      });
    }

  </script>
</body>
</html>
