<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>addi-w-day</title>
  <style>
    :root {
      --bg1: #d8f0ff;
      --bg2: #fff6dc;
      --text: #1f2a36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: auto;
      font-family: "Arial", sans-serif;
      color: var(--text);
      background: #d9e5ef;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 0 2px 0 #fff;
      z-index: 1;
      pointer-events: none;
      text-align: center;
    }

    .stage {
      position: relative;
      width: min(92vw, 1100px);
      z-index: 3;
    }

    .sheet {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      user-select: none;
      -webkit-user-drag: none;
    }

    .pet-hit {
      position: absolute;
      border: 0;
      background: transparent;
      cursor: pointer;
      transition: transform 0.08s linear;
      border-radius: 20px;
    }

    .pet-hit:active {
      transform: scale(0.92);
    }

    #cat { left: 5%; top: 5%; width: 18%; height: 27%; }
    #lion { left: 28%; top: 5%; width: 18%; height: 27%; }
    #tiger { left: 50%; top: 6%; width: 20%; height: 26%; }
    #chick { left: 75%; top: 7%; width: 12%; height: 22%; }
    #seal { left: 5%; top: 37%; width: 17%; height: 27%; }
    #penguin { left: 29%; top: 37%; width: 14%; height: 27%; }
    #fox { left: 50%; top: 38%; width: 21%; height: 26%; }
    #deer { left: 73%; top: 37%; width: 16%; height: 28%; }
    #bear { left: 9%; top: 69%; width: 18%; height: 28%; }
    #koala { left: 31%; top: 69%; width: 18%; height: 28%; }

  </style>
</head>
<body>
  <h1>אוהב אותך אישתי האהובה</h1>

  <div class="stage">
    <img class="sheet" src="./chibi-sheet.png" alt="Chibi animals" />
    <button id="cat" class="pet-hit" aria-label="Cat" data-sound="cat"></button>
    <button id="lion" class="pet-hit" aria-label="Lion" data-sound="lion"></button>
    <button id="tiger" class="pet-hit" aria-label="Tiger" data-sound="tiger"></button>
    <button id="chick" class="pet-hit" aria-label="Chick" data-sound="chick"></button>
    <button id="seal" class="pet-hit" aria-label="Seal" data-sound="seal"></button>
    <button id="penguin" class="pet-hit" aria-label="Penguin" data-sound="penguin"></button>
    <button id="fox" class="pet-hit" aria-label="Fox" data-sound="fox"></button>
    <button id="deer" class="pet-hit" aria-label="Deer" data-sound="deer"></button>
    <button id="bear" class="pet-hit" aria-label="Bear" data-sound="bear"></button>
    <button id="koala" class="pet-hit" aria-label="Koala" data-sound="koala"></button>
  </div>

  <audio id="catSound" preload="auto" src="./assets/sounds/cat.mp3"></audio>
  <audio id="lionSound" preload="auto" src="./assets/sounds/lion.mp3"></audio>
  <audio id="tigerSound" preload="auto" src="./assets/sounds/tiger.mp3"></audio>
  <audio id="chickSound" preload="auto" src="./assets/sounds/chick.mp3"></audio>
  <audio id="sealSound" preload="auto" src="./assets/sounds/seal.mp3"></audio>
  <audio id="penguinSound" preload="auto" src="./assets/sounds/penguin.mp3"></audio>
  <audio id="foxSound" preload="auto" src="./assets/sounds/fox.mp3"></audio>
  <audio id="deerSound" preload="auto" src="./assets/sounds/deer.mp3"></audio>
  <audio id="bearSound" preload="auto" src="./assets/sounds/bear.mp3"></audio>
  <audio id="koalaSound" preload="auto" src="./assets/sounds/koala.mp3"></audio>

  <script>
    const sounds = {
      cat: document.getElementById("catSound"),
      lion: document.getElementById("lionSound"),
      tiger: document.getElementById("tigerSound"),
      chick: document.getElementById("chickSound"),
      seal: document.getElementById("sealSound"),
      penguin: document.getElementById("penguinSound"),
      fox: document.getElementById("foxSound"),
      deer: document.getElementById("deerSound"),
      bear: document.getElementById("bearSound"),
      koala: document.getElementById("koalaSound"),
    };
    const pets = Array.from(document.querySelectorAll(".pet-hit"));

    for (const pet of pets) {
      pet.addEventListener("click", async () => {
        try {
          const soundName = pet.dataset.sound || "cat";
          const audio = sounds[soundName] || sounds.cat;
          audio.currentTime = 0;
          await audio.play();
        } catch (err) {
          console.error("Audio play blocked", err);
        }
      });
    }

  </script>
</body>
</html>
