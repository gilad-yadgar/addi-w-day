<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>addi-w-day</title>
  <style>
    :root {
      --bg1: #d8f0ff;
      --bg2: #fff6dc;
      --text: #1f2a36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Arial", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg1) 45%, var(--bg2) 100%);
    }

    h1 {
      position: fixed;
      inset: 0;
      margin: auto;
      width: fit-content;
      height: fit-content;
      font-size: clamp(2rem, 8vw, 5rem);
      text-shadow: 0 2px 0 #fff;
      z-index: 1;
      pointer-events: none;
    }

    .pet {
      position: fixed;
      width: 170px;
      height: 170px;
      user-select: none;
      cursor: pointer;
      z-index: 3;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.2));
      transition: transform 0.1s linear;
      -webkit-user-drag: none;
      background-image: url("./chibi-sheet.png");
      background-size: 768px 512px;
      background-repeat: no-repeat;
      border-radius: 18px;
    }

    .pet:active {
      transform: scale(0.92);
    }

    #penguin {
      background-position: -230px -215px;
      right: 18%;
      top: 56%;
    }

    #rabbit {
      background-position: -505px -215px;
      left: 18%;
      top: 56%;
    }

    .hint {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      z-index: 5;
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body>
  <h1>אוהב אותך אישתי האהובה</h1>
  <div class="hint">תלחצי עליהם - הם עושים רעש</div>

  <div id="penguin" class="pet" role="button" aria-label="Chibi penguin"></div>
  <div id="rabbit" class="pet" role="button" aria-label="Chibi rabbit"></div>

  <audio id="penguinSound" preload="auto" src="./assets/sounds/penguin.mp3"></audio>
  <audio id="rabbitSound" preload="auto" src="./assets/sounds/rabbit.mp3"></audio>

  <script>
    const pets = [
      {
        el: document.getElementById("penguin"),
        audio: document.getElementById("penguinSound"),
      },
      {
        el: document.getElementById("rabbit"),
        audio: document.getElementById("rabbitSound"),
      },
    ];

    for (const pet of pets) {
      pet.el.addEventListener("click", async () => {
        try {
          pet.audio.currentTime = 0;
          await pet.audio.play();
        } catch (err) {
          console.error("Audio play blocked", err);
        }
      });
    }

  </script>
</body>
</html>
